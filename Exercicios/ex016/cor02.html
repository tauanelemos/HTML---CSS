<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        * { /*Configurações globais das CSS */
            height: 100%;
        }
        body{                                    
            background-image: linear-gradient(to right, #3198E2 10%, #6D59C0, #B93590, #E33F5F, #FDD579); 
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1> <!-- to right, left, top, bottom (direção) / 45deg, -45deg(gral de inclinação) / radial-gradient(circle)-->
</body>
</html>
